<!doctype html>
<html>
  <head>
    <meta property="og:title" content="Christos Evi" />

    <meta property="og:image" content="./wedding_invitation.png" />
  </head>
  <style>
    body {
      padding: 0;
      margin: 0;
    }

    #invitationContainer {
      overflow-y: hidden;
      width: 100%;
      display: flex;
      justify-content: center;
      height: 100vh;
      cursor: pointer;
    }
    @media (max-width: 800px) {
      #invitationContainer {
        width: 100% !important;
      }
      #invitationWrapper {
        height: 100vw !important;
      }
    }

    #invitationWrapper {
      position: relative;
      height: 70vh;
      align-self: center;
      align-content: center;
      overflow: visible;
      transform: rotate(90deg);
      transition-duration: 4s;
    }

    #invitationWrapper.clicked {
      transform: rotate(0deg);
      transform: scale(1.2);
    }

    #invitation {
      height: 70vh;
      /* box-shadow: 0px 0px 21px -7px black; */
      filter: blur(4px) drop-shadow(2px 2px 3px black);
      transition-duration: 4s;
    }

    #invitationWrapper.clicked #invitation {
      filter: blur(0) drop-shadow(2px 2px 3px black);
    }

    #left {
      /* content: ''; */
      z-index: 1;
      position: absolute;
      /* background: #cdcaca70; */
      background: url("./weddin-invitation-bg.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      transition-duration: 4s;

      /* box-shadow: 10px 0px 21px -7px black; */
      /* filter:  drop-shadow(2px 2px 3px black); */
      transform: translate(0px, 20%);
      transform-origin: 0% 50%;
      transform: perspective(500px) rotateY(0deg);
      transform-origin: left center;
    }
    #invitationWrapper.clicked #left {
      /* width: 0; */
      box-shadow: none;
      /* transform: skew(0deg, 20deg); */

      transform: perspective(500px) rotateY(-120deg);
      /* transform: translate(0px, 21%) perspective(1px) rotateY(-90deg); */
    }

    #right {
      /* content: ''; */
      z-index: 2;
      position: absolute;
      /* background: #cdcaca70; */
      background: url("./weddin-invitation-bg.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      top: 0;
      right: 0;
      width: 70%;
      height: 100%;
      /* transition-duration: 4s; */
      transition: transform 4s ease 1s; /* duration 4s, delay 1s */

      /* box-shadow: 10px 0px 21px -7px black; */
      /* filter: contrast(0.5) drop-shadow(2px 2px 3px black); */
      transform: translate(0px, 20%);
      /* transform: translate3d(-16.3vmin, 0vmin, 0vmin) rotateY(-0.1deg); */
      transform: perspective(500px) rotateY(0deg);
      transform-origin: right center;
      transition-delay: 0.5s;
    }
    #invitationWrapper.clicked #right {
      /* width: 0; */
      /* right: -50%; */
      box-shadow: none;
      /* height: 80vh; */
      transform: perspective(500px) rotateY(120deg);
      /* transform: translate(0px, 10vh) perspective(10px) rotateY(1deg) */
    }

    #waxMark {
      position: absolute;
      top: 50%;
      transition-duration: 2s;
    }
    #waxMark2 {
      position: absolute;
      top: 50%;
      transition-duration: 2s;
    }
    #wax {
      width: 12vh;
      height: 12vh;
      border-radius: 50%;

      filter: contrast(60%) sepia(80%) brightness(0.9)
        drop-shadow(2px 2px 3px black);

      /* subtle light for realism */
      background: radial-gradient(
        circle at 30% 30%,
        rgba(255, 255, 255, 0.25),
        transparent 60%
      );
    }
    #left #wax {
      left: calc(83%);
    }
    #left #mark {
      left: calc(83%);
      padding: 2.2vh;
      transform: rotate(-90deg);
    }

    #left #waxContainer {
      top: 41%;
      left: calc(80%);
      position: absolute;
      width: 4vh;
      height: 12vh;
      overflow: hidden;
    }
    #left #markContainer {
      top: 41%;
      left: calc(80%);
      position: absolute;
      width: 4vh;
      height: 12vh;
      overflow: hidden;
    }
    #right #waxContainer {
      top: 41%;
      right: calc(63%);
      position: absolute;
      width: 8vh;
      height: 12vh;
      overflow: hidden;
      /* filter: drop-shadow(2px 4px 6px black); */
      z-index: 2;
    }
    #right #markContainer {
      top: 41%;
      right: calc(67%);
      position: absolute;
      width: 6.5vh;
      height: 12vh;
      overflow: hidden;
    }
    #right #waxContainer #wax,
    #right #markContainer #mark {
      position: absolute;
      top: 0;
      right: 0;
      transform: rotate(-90deg);
    }
    #mark {
      z-index: 3;
      width: 7.5vh;
      height: 7.5vh;
      padding: 2.2vh 1vh;

      /* Make it blend into wax */
      mix-blend-mode: multiply;

      /* Turn it into engraving tone */
      filter: grayscale(100%) contrast(140%) brightness(60%);

      opacity: 0.9;
    }

    #waxContainer {
      width: 6vh;
    }
    #markContainer {
      width: 6vh;
    }

    #invitationWrapper.clicked #mark {
      /* opacity: 0; */
      /* left: -6vh; */
    }

    #invitationWrapper.clicked #waxMark {
      /* opacity: 0; */
      /* left: -6vh; */
    }

    #invitationWrapper.clicked #waxMark2 {
      /* opacity: 0; */
      /* left: 12vh; */
    }

    #feather {
      transform: rotate(100deg);
      width: 16vh;
      top: 20%;
      position: absolute;
      z-index: 1;
      left: -5%;
      filter: drop-shadow(2px 4px 6px black);
    }

    #invitationWrapper #clickHere {
      position: absolute;

      transform: rotate(-90deg);
      z-index: 6;
      /* border: 1px solid black; */
      /* padding: 3vh 0; */
      text-align: center;
      font-size: 2vh;
      top: 46%;
      border-radius: 3px;
      width: 130%;
      /* left: 3%; */
      /* transform: translateX(50%); */
      transition-delay: 2s;
      transition-duration: 2s;
      display: flex;
      justify-content: center;
    }

    #invitationWrapper.clicked #clickHere {
      transition-delay: 0s;
      color: transparent;
      border-color: transparent;
    }
    #invitationWrapper.clicked #here {
      transition-delay: 0s;
      color: transparent;
      border-color: transparent;
    }

    #here {
      transition-delay: 2s;
      transition-duration: 2s;
      width: fit-content;
      border: 1px solid black;
      color: black;
      padding: 1vh 3vh;
      border-radius: 3px;
    }

    #left.second {
      box-shadow: none;
      /* background: transparent; */
      z-index: 2;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
      z-index: 9999;
      font-size: 2rem;
    }
    #loader.hidden {
      display: none;
    }
  </style>
  <body>
    <div id="loader">loading...</div>
    <div id="invitationContainer">
      <div id="invitationWrapper">
        <div id="clickHere">
          <div id="here">Πατήστε Για Άνοιγμα</div>
        </div>
        <div id="left">
          <div id="waxContainer">
            <img id="wax" src="./wax.png" />
          </div>
          <div id="markContainer">
            <img id="mark" src="./emplem.png" />
          </div>
        </div>
        <div id="right">
          <div id="waxContainer">
            <img id="wax" src="./wax.png" />
          </div>
          <div id="markContainer">
            <img id="mark" src="./emplem.png" />
          </div>
          <!-- <img id="feather" src="./pngwing.com2.png" /> -->
        </div>
        <img src="./wedding_invitation.png" id="invitation" />

        <div id="left" class="second">
          <div id="waxContainer">
            <img id="wax" src="./wax.png" />
          </div>
          <div id="markContainer">
            <img id="mark" src="./emplem.png" />
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    let mark = document.getElementById("invitationContainer");
    mark.addEventListener("click", () => {
      let invitationWrapper = document.getElementById("invitationWrapper");
      if (invitationWrapper.classList.contains("clicked")) {
        invitationWrapper.classList.remove("clicked");
      } else {
        invitationWrapper.classList.add("clicked");
      }
    });
  </script>
  <script>
    window.addEventListener("load", function () {
      const loader = document.getElementById("loader");
      loader.classList.add("hidden");

      setTimeout(() => {
        loader.remove(); // optional cleanup
      }, 300);
    });
  </script>
</html>
